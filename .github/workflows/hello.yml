name: First Workflow
on:
 push:
jobs:
 hello:
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4
   - name: Print Message
     run: echo "Hello World"
   - name: Show Current Directory
     run: pwd
   - name: Show User
     run: whoami
   - name: List Files
     run: ls -la
   - name: Execute Script
     run: bash hello.sh
