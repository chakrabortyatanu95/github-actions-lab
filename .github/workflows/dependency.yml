name: CI Pipeline

on:

  push:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v7

    - name: Testing

      run: |

        echo "Running Tests"

        sleep 5

        echo "Tests Passed"


  build:

    needs: test

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Build

      run: |

        echo "Building App"

        sleep 5

        echo "Build Success"


  deploy:

    needs: build

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Deploy

      run: |

        echo "Deploying"

        sleep 5

        echo "Deployment Successful"
